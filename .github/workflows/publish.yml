name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Emscripten
      if: ${{ !env.ACT }}
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.56'

    - name: Build native stub
      if: ${{ !env.ACT }}
      run: bash src/Base/SqliteWasmBlazor/native/build_stub.sh

    - name: Verify native stub was built
      if: ${{ !env.ACT }}
      run: |
        ls -lh src/Base/SqliteWasmBlazor/native/lib/e_sqlite3.a
        file src/Base/SqliteWasmBlazor/native/lib/e_sqlite3.a

    - name: Install npm dependencies (TypeScript-Common)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Common

    - name: Install npm dependencies (TypeScript-Crypto)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Crypto

    - name: Install npm dependencies (SqliteWasmBlazor worker)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript

    - name: Install npm dependencies (Components)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor.Components/TypeScript

    - name: Install npm dependencies (Crypto worker)
      run: npm install
      working-directory: src/Crypto/SqliteWasmBlazor.Crypto/TypeScript

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    # Build each csproj individually in dependency order. We deliberately
    # avoid `dotnet restore SqliteWasmBlazor.slnx` followed by `dotnet build
    # --no-restore`: the solution-wide restore evaluates BOTH branches of
    # the Demo's `<ItemGroup Condition="...">` blocks (ItemGroup conditions
    # are ignored at restore time), picks the leaked ProjectReference over
    # the Release-only PackageReference, and writes type=project into
    # Crypto's project.assets.json. Build then fails with CS0234 because
    # the conditional ProjectReference is excluded at build evaluation but
    # the assets.json claims the dep is already satisfied. Per-project
    # `dotnet build` does single-project restore which honors ItemGroup
    # conditions correctly.
    - name: Build SqliteWasmBlazor (base) — auto-pack
      run: dotnet build src/Base/SqliteWasmBlazor/SqliteWasmBlazor.csproj -c Release

    - name: Build SqliteWasmBlazor.Models
      run: dotnet build src/Base/SqliteWasmBlazor.Models/SqliteWasmBlazor.Models.csproj -c Release

    - name: Build SqliteWasmBlazor.Components
      run: dotnet build src/Base/SqliteWasmBlazor.Components/SqliteWasmBlazor.Components.csproj -c Release

    - name: Build SqliteWasmBlazor.Crypto — auto-pack
      run: dotnet build src/Crypto/SqliteWasmBlazor.Crypto/SqliteWasmBlazor.Crypto.csproj -c Release

    - name: Build SqliteWasmBlazor.Crypto.UI — auto-pack
      run: dotnet build src/Crypto/SqliteWasmBlazor.Crypto.UI/SqliteWasmBlazor.Crypto.UI.csproj -c Release

    # Only the test pipeline. Samples (FloatingWindow, Demo, AdoNetSample)
    # and Crypto.BouncyCastle are not consumed by Tests / TestHost / TestApp
    # and not packed — building them here would just burn runner minutes.
    # The full-repo sanity build belongs in build.yml.
    #
    # `dotnet build Tests.csproj` transitively walks TestHost ->
    # TestApp -> Components / Models (TestApp's unconditional ProjectReferences
    # to base / Crypto are also walked, but those already auto-packed
    # above and MSBuild's UpToDate check skips them).
    - name: Build tests
      run: dotnet build tests/SqliteWasmBlazor.Tests/SqliteWasmBlazor.Tests.csproj -c Release

    # Repack each library with the tagged release version. The auto-pack
    # from `dotnet build` above used the default 0.9.1-pre stamped in
    # Directory.Packages.props; these tagged packs overwrite with the
    # version from the git tag and become the artifacts pushed to NuGet.
    - name: Pack SqliteWasmBlazor with version
      run: dotnet pack src/Base/SqliteWasmBlazor/SqliteWasmBlazor.csproj -c Release --no-build --output ./.nuget /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Pack SqliteWasmBlazor.Crypto with version
      run: dotnet pack src/Crypto/SqliteWasmBlazor.Crypto/SqliteWasmBlazor.Crypto.csproj -c Release --no-build --output ./.nuget /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Pack SqliteWasmBlazor.Crypto.UI with version
      run: dotnet pack src/Crypto/SqliteWasmBlazor.Crypto.UI/SqliteWasmBlazor.Crypto.UI.csproj -c Release --no-build --output ./.nuget /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Install Playwright browsers
      run: pwsh tests/SqliteWasmBlazor.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps

    # `--logger trx` writes a structured XML report naming each failed test
    # plus its exception message — critical when VSTestTask returns false
    # without logging (MSB4181), which hides the actual assertion failure.
    - name: Test
      run: |
        dotnet test tests/SqliteWasmBlazor.Tests/SqliteWasmBlazor.Tests.csproj \
          -c Release --no-build --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "console;verbosity=detailed" \
          --blame-hang-timeout 5m --blame-crash \
          --results-directory TestResults

    - name: Upload test diagnostics on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-diagnostics
        path: |
          TestResults/**/*
          tests/SqliteWasmBlazor.Tests/TestResults/**/*
        if-no-files-found: warn

    - name: Publish to NuGet
      run: dotnet nuget push ./.nuget/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./.nuget/*.nupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
