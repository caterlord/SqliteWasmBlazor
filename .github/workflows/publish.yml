name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Emscripten
      if: ${{ !env.ACT }}
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.56'

    - name: Build native stub
      if: ${{ !env.ACT }}
      run: bash src/Base/SqliteWasmBlazor/native/build_stub.sh

    - name: Verify native stub was built
      if: ${{ !env.ACT }}
      run: |
        ls -lh src/Base/SqliteWasmBlazor/native/lib/e_sqlite3.a
        file src/Base/SqliteWasmBlazor/native/lib/e_sqlite3.a

    - name: Install npm dependencies (TypeScript-Common)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Common

    - name: Install npm dependencies (TypeScript-Crypto)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Crypto

    - name: Install npm dependencies (SqliteWasmBlazor worker)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript

    - name: Install npm dependencies (Components)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor.Components/TypeScript

    - name: Install npm dependencies (Crypto worker)
      run: npm install
      working-directory: src/Crypto/SqliteWasmBlazor.Crypto/TypeScript

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Restore all dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Pack SqliteWasmBlazor with version
      run: dotnet pack src/Base/SqliteWasmBlazor/SqliteWasmBlazor.csproj --configuration Release --no-build --output ./.nuget /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Pack SqliteWasmBlazor.Crypto with version
      run: dotnet pack src/Crypto/SqliteWasmBlazor.Crypto/SqliteWasmBlazor.Crypto.csproj --configuration Release --no-build --output ./.nuget /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Pack SqliteWasmBlazor.Crypto.UI with version
      run: dotnet pack src/Crypto/SqliteWasmBlazor.Crypto.UI/SqliteWasmBlazor.Crypto.UI.csproj --configuration Release --no-build --output ./.nuget /p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Publish to NuGet
      run: dotnet nuget push ./.nuget/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./.nuget/*.nupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
