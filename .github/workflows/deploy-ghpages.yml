name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Emscripten
      if: ${{ !env.ACT }}
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.56'

    - name: Build native stub
      if: ${{ !env.ACT }}
      run: bash src/Base/SqliteWasmBlazor/native/build_stub.sh

    - name: Install npm dependencies (TypeScript-Common)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Common

    - name: Install npm dependencies (TypeScript-Crypto)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Crypto

    - name: Install npm dependencies (SqliteWasmBlazor worker)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript

    - name: Install npm dependencies (Components)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor.Components/TypeScript

    - name: Install npm dependencies (Crypto worker)
      run: npm install
      working-directory: src/Crypto/SqliteWasmBlazor.Crypto/TypeScript

    - name: Set rootFolder for GitHub Pages
      run: |
        cat samples/SqliteWasmBlazor.Demo/wwwroot/appsettings.json | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        d['rootFolder'] = '/SqliteWasmBlazor/'
        json.dump(d, sys.stdout, indent=2)
        " > /tmp/appsettings.json && mv /tmp/appsettings.json samples/SqliteWasmBlazor.Demo/wwwroot/appsettings.json

    - name: Clean previous builds
      run: |
        dotnet clean -c Release --nologo
        rm -rf samples/SqliteWasmBlazor.Demo/bin/Release samples/SqliteWasmBlazor.Demo/obj/Release

    - name: Build Demo
      run: dotnet build samples/SqliteWasmBlazor.Demo/SqliteWasmBlazor.Demo.csproj -c Release --nologo

    - name: Publish Demo
      run: dotnet publish samples/SqliteWasmBlazor.Demo/SqliteWasmBlazor.Demo.csproj -c Release -o ./build --nologo /p:UseSharedCompilation=false

    - name: Add .nojekyll and 404.html
      run: |
        cd build/wwwroot
        touch .nojekyll
        cp index.html 404.html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./build/wwwroot

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
